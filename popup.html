<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #ddd;
      margin: 0;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #fff;
    }
    .label-list {
      list-style: none;
      padding: 0;
      margin: 0 0 10px;
    }
    .label-list li {
      display: flex;
      align-items: center;
      padding: 4px 6px;
      background: #2a2a2a;
      border-radius: 4px;
      margin-bottom: 4px;
      cursor: grab;
      user-select: none;
    }
    .label-list li.dragging {
      opacity: 0.4;
    }
    .label-list li .drag-handle {
      color: #555;
      margin-right: 6px;
      font-size: 11px;
      cursor: grab;
    }
    .label-list li span.label-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .label-list li button {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 16px;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
    }
    .label-list li button:hover {
      color: #e55;
    }
    .add-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .add-row input {
      flex: 1;
      padding: 4px 8px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      color: #ddd;
      font-size: 13px;
    }
    .add-row button {
      padding: 4px 10px;
      background: #3a3a3a;
      border: 1px solid #4a4a4a;
      border-radius: 4px;
      color: #ddd;
      cursor: pointer;
      font-size: 13px;
    }
    .add-row button:hover {
      background: #4a4a4a;
    }
    .option {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .option input[type="checkbox"] {
      accent-color: #6a6aff;
    }
  </style>
</head>
<body>
  <h3>Quick Reply Labels</h3>
  <ul class="label-list" id="label-list"></ul>
  <div class="add-row">
    <input type="text" id="new-label" placeholder="New label..." />
    <button id="add-btn">Add</button>
  </div>
  <div class="option">
    <input type="checkbox" id="auto-resolve" checked />
    <label for="auto-resolve">Auto-submit and resolve thread</label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
